<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="50%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0"/>
    </linearGradient>
    <filter id="titleGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#58a6ff" flood-opacity="0.2"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.03" fill="#58a6ff">
    <circle cx="50" cy="40" r="1"/><circle cx="100" cy="40" r="1"/><circle cx="150" cy="40" r="1"/><circle cx="200" cy="40" r="1"/><circle cx="250" cy="40" r="1"/><circle cx="300" cy="40" r="1"/><circle cx="350" cy="40" r="1"/><circle cx="400" cy="40" r="1"/><circle cx="450" cy="40" r="1"/><circle cx="500" cy="40" r="1"/><circle cx="550" cy="40" r="1"/><circle cx="600" cy="40" r="1"/><circle cx="650" cy="40" r="1"/><circle cx="700" cy="40" r="1"/><circle cx="750" cy="40" r="1"/><circle cx="800" cy="40" r="1"/><circle cx="850" cy="40" r="1"/>
    <circle cx="50" cy="80" r="1"/><circle cx="100" cy="80" r="1"/><circle cx="150" cy="80" r="1"/><circle cx="200" cy="80" r="1"/><circle cx="250" cy="80" r="1"/><circle cx="300" cy="80" r="1"/><circle cx="350" cy="80" r="1"/><circle cx="400" cy="80" r="1"/><circle cx="450" cy="80" r="1"/><circle cx="500" cy="80" r="1"/><circle cx="550" cy="80" r="1"/><circle cx="600" cy="80" r="1"/><circle cx="650" cy="80" r="1"/><circle cx="700" cy="80" r="1"/><circle cx="750" cy="80" r="1"/><circle cx="800" cy="80" r="1"/><circle cx="850" cy="80" r="1"/>
    <circle cx="50" cy="120" r="1"/><circle cx="100" cy="120" r="1"/><circle cx="150" cy="120" r="1"/><circle cx="200" cy="120" r="1"/><circle cx="250" cy="120" r="1"/><circle cx="300" cy="120" r="1"/><circle cx="350" cy="120" r="1"/><circle cx="400" cy="120" r="1"/><circle cx="450" cy="120" r="1"/><circle cx="500" cy="120" r="1"/><circle cx="550" cy="120" r="1"/><circle cx="600" cy="120" r="1"/><circle cx="650" cy="120" r="1"/><circle cx="700" cy="120" r="1"/><circle cx="750" cy="120" r="1"/><circle cx="800" cy="120" r="1"/><circle cx="850" cy="120" r="1"/>
    <circle cx="50" cy="200" r="1"/><circle cx="100" cy="200" r="1"/><circle cx="150" cy="200" r="1"/><circle cx="200" cy="200" r="1"/><circle cx="250" cy="200" r="1"/><circle cx="300" cy="200" r="1"/><circle cx="350" cy="200" r="1"/><circle cx="400" cy="200" r="1"/><circle cx="450" cy="200" r="1"/><circle cx="500" cy="200" r="1"/><circle cx="550" cy="200" r="1"/><circle cx="600" cy="200" r="1"/><circle cx="650" cy="200" r="1"/><circle cx="700" cy="200" r="1"/><circle cx="750" cy="200" r="1"/><circle cx="800" cy="200" r="1"/><circle cx="850" cy="200" r="1"/>
    <circle cx="50" cy="240" r="1"/><circle cx="100" cy="240" r="1"/><circle cx="150" cy="240" r="1"/><circle cx="200" cy="240" r="1"/><circle cx="250" cy="240" r="1"/><circle cx="300" cy="240" r="1"/><circle cx="350" cy="240" r="1"/><circle cx="400" cy="240" r="1"/><circle cx="450" cy="240" r="1"/><circle cx="500" cy="240" r="1"/><circle cx="550" cy="240" r="1"/><circle cx="600" cy="240" r="1"/><circle cx="650" cy="240" r="1"/><circle cx="700" cy="240" r="1"/><circle cx="750" cy="240" r="1"/><circle cx="800" cy="240" r="1"/><circle cx="850" cy="240" r="1"/>
    <circle cx="50" cy="280" r="1"/><circle cx="100" cy="280" r="1"/><circle cx="150" cy="280" r="1"/><circle cx="200" cy="280" r="1"/><circle cx="250" cy="280" r="1"/><circle cx="300" cy="280" r="1"/><circle cx="350" cy="280" r="1"/><circle cx="400" cy="280" r="1"/><circle cx="450" cy="280" r="1"/><circle cx="500" cy="280" r="1"/><circle cx="550" cy="280" r="1"/><circle cx="600" cy="280" r="1"/><circle cx="650" cy="280" r="1"/><circle cx="700" cy="280" r="1"/><circle cx="750" cy="280" r="1"/><circle cx="800" cy="280" r="1"/><circle cx="850" cy="280" r="1"/>
  </g>

  <!-- ============ Left: Mini Dashboard Visual ============ -->
  <g transform="translate(45, 55)" filter="url(#cardShadow)">
    <!-- Dashboard card -->
    <rect width="260" height="210" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>

    <!-- Title bar -->
    <rect width="260" height="28" rx="8" fill="#21262d"/>
    <rect y="20" width="260" height="8" fill="#21262d"/>
    <circle cx="14" cy="14" r="4" fill="#f85149" opacity="0.8"/>
    <circle cx="28" cy="14" r="4" fill="#f0883e" opacity="0.8"/>
    <circle cx="42" cy="14" r="4" fill="#3fb950" opacity="0.8"/>
    <text x="130" y="18" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle" font-weight="600">Mission Control</text>

    <!-- Pipeline tabs -->
    <g transform="translate(8, 36)">
      <rect width="42" height="14" rx="3" fill="#1f6feb" opacity="0.25" stroke="#1f6feb" stroke-width="0.5"/>
      <text x="21" y="10" font-family="system-ui, sans-serif" font-size="6" fill="#58a6ff" text-anchor="middle" font-weight="600">All 57</text>
      <rect x="46" width="46" height="14" rx="3" fill="#21262d"/>
      <text x="69" y="10" font-family="system-ui, sans-serif" font-size="6" fill="#484f58" text-anchor="middle">Watching</text>
      <rect x="96" width="52" height="14" rx="3" fill="#21262d"/>
      <text x="122" y="10" font-family="system-ui, sans-serif" font-size="6" fill="#484f58" text-anchor="middle">Downloaded</text>
      <rect x="152" width="38" height="14" rx="3" fill="#21262d"/>
      <text x="171" y="10" font-family="system-ui, sans-serif" font-size="6" fill="#484f58" text-anchor="middle">Active</text>
      <rect x="194" width="48" height="14" rx="3" fill="#21262d"/>
      <text x="218" y="10" font-family="system-ui, sans-serif" font-size="6" fill="#484f58" text-anchor="middle">Archived</text>
    </g>

    <!-- Table header -->
    <line x1="8" y1="58" x2="252" y2="58" stroke="#21262d" stroke-width="0.5"/>
    <text x="14" y="68" font-family="system-ui, sans-serif" font-size="6" fill="#484f58" font-weight="600">Repository</text>
    <text x="115" y="68" font-family="system-ui, sans-serif" font-size="6" fill="#484f58" font-weight="600">Stage</text>
    <text x="160" y="68" font-family="system-ui, sans-serif" font-size="6" fill="#484f58" font-weight="600">Watch</text>
    <text x="210" y="68" font-family="system-ui, sans-serif" font-size="6" fill="#484f58" font-weight="600">Local</text>
    <line x1="8" y1="72" x2="252" y2="72" stroke="#21262d" stroke-width="0.5"/>

    <!-- Row 1 — Active, up to date -->
    <text x="14" y="84" font-family="system-ui, sans-serif" font-size="7" fill="#58a6ff" font-weight="600">exo-explore/exo</text>
    <rect x="110" y="77" width="36" height="11" rx="5.5" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.4"/>
    <text x="128" y="85" font-family="system-ui, sans-serif" font-size="5.5" fill="#f0883e" text-anchor="middle">Active</text>
    <rect x="153" y="77" width="44" height="11" rx="5.5" fill="#3fb950" opacity="0.1" stroke="#3fb950" stroke-width="0.4"/>
    <text x="175" y="85" font-family="system-ui, sans-serif" font-size="5.5" fill="#3fb950" text-anchor="middle">Full Watch</text>
    <text x="210" y="85" font-family="system-ui, sans-serif" font-size="6" fill="#3fb950">Up to date</text>
    <line x1="8" y1="90" x2="252" y2="90" stroke="#21262d" stroke-width="0.3" opacity="0.5"/>

    <!-- Row 2 — Downloaded, outdated -->
    <text x="14" y="102" font-family="system-ui, sans-serif" font-size="7" fill="#58a6ff" font-weight="600">langchain-ai/langchain</text>
    <rect x="110" y="95" width="42" height="11" rx="5.5" fill="#58a6ff" opacity="0.15" stroke="#58a6ff" stroke-width="0.4"/>
    <text x="131" y="103" font-family="system-ui, sans-serif" font-size="5.5" fill="#58a6ff" text-anchor="middle">Downloaded</text>
    <rect x="153" y="95" width="44" height="11" rx="5.5" fill="#484f58" opacity="0.2" stroke="#484f58" stroke-width="0.4"/>
    <text x="175" y="103" font-family="system-ui, sans-serif" font-size="5.5" fill="#8b949e" text-anchor="middle">Releases</text>
    <text x="210" y="103" font-family="system-ui, sans-serif" font-size="6" fill="#f85149">Outdated</text>
    <line x1="8" y1="108" x2="252" y2="108" stroke="#21262d" stroke-width="0.3" opacity="0.5"/>

    <!-- Row 3 — Watching -->
    <text x="14" y="120" font-family="system-ui, sans-serif" font-size="7" fill="#58a6ff" font-weight="600">browser-use/browser-use</text>
    <rect x="110" y="113" width="38" height="11" rx="5.5" fill="#8b949e" opacity="0.12" stroke="#8b949e" stroke-width="0.4"/>
    <text x="129" y="121" font-family="system-ui, sans-serif" font-size="5.5" fill="#8b949e" text-anchor="middle">Watching</text>
    <rect x="153" y="113" width="44" height="11" rx="5.5" fill="#d29922" opacity="0.12" stroke="#d29922" stroke-width="0.4"/>
    <text x="175" y="121" font-family="system-ui, sans-serif" font-size="5.5" fill="#d29922" text-anchor="middle">Tracking</text>
    <text x="210" y="121" font-family="system-ui, sans-serif" font-size="6" fill="#484f58">Not cloned</text>
    <line x1="8" y1="126" x2="252" y2="126" stroke="#21262d" stroke-width="0.3" opacity="0.5"/>

    <!-- Row 4 — Want to Try -->
    <text x="14" y="138" font-family="system-ui, sans-serif" font-size="7" fill="#58a6ff" font-weight="600">pocketbase/pocketbase</text>
    <rect x="110" y="131" width="42" height="11" rx="5.5" fill="#d2a8ff" opacity="0.12" stroke="#d2a8ff" stroke-width="0.4"/>
    <text x="131" y="139" font-family="system-ui, sans-serif" font-size="5.5" fill="#d2a8ff" text-anchor="middle">Want to Try</text>
    <rect x="153" y="131" width="44" height="11" rx="5.5" fill="#484f58" opacity="0.2" stroke="#484f58" stroke-width="0.4"/>
    <text x="175" y="139" font-family="system-ui, sans-serif" font-size="5.5" fill="#8b949e" text-anchor="middle">Releases</text>
    <text x="210" y="139" font-family="system-ui, sans-serif" font-size="6" fill="#484f58">Not cloned</text>
    <line x1="8" y1="144" x2="252" y2="144" stroke="#21262d" stroke-width="0.3" opacity="0.5"/>

    <!-- Row 5 — Security alert row (red tint) -->
    <rect x="4" y="148" width="252" height="18" fill="#f85149" opacity="0.04"/>
    <text x="14" y="160" font-family="system-ui, sans-serif" font-size="7" fill="#58a6ff" font-weight="600">expressjs/express</text>
    <rect x="110" y="153" width="36" height="11" rx="5.5" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.4"/>
    <text x="128" y="161" font-family="system-ui, sans-serif" font-size="5.5" fill="#f0883e" text-anchor="middle">Active</text>
    <rect x="153" y="153" width="44" height="11" rx="5.5" fill="#3fb950" opacity="0.1" stroke="#3fb950" stroke-width="0.4"/>
    <text x="175" y="161" font-family="system-ui, sans-serif" font-size="5.5" fill="#3fb950" text-anchor="middle">Full Watch</text>
    <text x="210" y="161" font-family="system-ui, sans-serif" font-size="6" fill="#f85149">Vulnerable</text>
    <line x1="8" y1="168" x2="252" y2="168" stroke="#21262d" stroke-width="0.3" opacity="0.5"/>

    <!-- Fade out rows -->
    <rect x="0" y="170" width="260" height="40" fill="url(#bg)" opacity="0.7"/>

    <!-- Stats bar at bottom -->
    <text x="14" y="200" font-family="system-ui, sans-serif" font-size="6.5" fill="#484f58">57 repos  ·  12 cloned  ·  3.8 GB</text>
  </g>

  <!-- ============ Right: Title & Content ============ -->

  <!-- Star icon -->
  <g transform="translate(440, 62)" fill="#f0883e" filter="url(#starGlow)">
    <polygon points="20,0 25,15 41,15 28,24 33,39 20,30 7,39 12,24 -1,15 15,15"/>
  </g>

  <!-- Glow line above title -->
  <rect x="390" y="110" width="460" height="1" fill="url(#glow)"/>

  <!-- Title -->
  <text x="620" y="150" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="56" font-weight="700" fill="#f0f6fc" text-anchor="middle" letter-spacing="4" filter="url(#titleGlow)">StarDeck</text>

  <!-- Tagline -->
  <text x="620" y="180" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="3">MISSION CONTROL FOR YOUR GITHUB STARS</text>

  <!-- Glow line below tagline -->
  <rect x="390" y="193" width="460" height="1" fill="url(#glow)"/>

  <!-- Feature pills -->
  <g font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="9.5" letter-spacing="0.3">
    <rect x="395" y="210" width="100" height="22" rx="11" fill="#1f6feb" opacity="0.12" stroke="#1f6feb" stroke-width="0.6" stroke-opacity="0.4"/>
    <text x="445" y="225" fill="#58a6ff" text-anchor="middle">Workflows</text>

    <rect x="505" y="210" width="88" height="22" rx="11" fill="#238636" opacity="0.12" stroke="#238636" stroke-width="0.6" stroke-opacity="0.4"/>
    <text x="549" y="225" fill="#3fb950" text-anchor="middle">Scanner</text>

    <rect x="603" y="210" width="90" height="22" rx="11" fill="#f0883e" opacity="0.12" stroke="#f0883e" stroke-width="0.6" stroke-opacity="0.4"/>
    <text x="648" y="225" fill="#f0883e" text-anchor="middle">Versions</text>

    <rect x="703" y="210" width="100" height="22" rx="11" fill="#d2a8ff" opacity="0.12" stroke="#d2a8ff" stroke-width="0.6" stroke-opacity="0.4"/>
    <text x="753" y="225" fill="#d2a8ff" text-anchor="middle">Collections</text>
  </g>

  <!-- Terminal command -->
  <text x="620" y="268" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="12" fill="#484f58" text-anchor="middle">
    <tspan fill="#3fb950">$</tspan> npm run build &amp;&amp; npm start
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="316" width="900" height="4" fill="url(#accent)"/>
</svg>
